<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 03 - Web Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-03.css">
  </head>
  <body>
    <div class="app-background">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
      
      <header class="glass-panel app-header">
        <h1>Analytics Workspace</h1>
        <button type="button" class="btn-export">Export Data</button>
      </header>

      <main class="app-main">
        
        <aside class="glass-panel sidebar-filters">
          <h2>Filters</h2>
          <form class="filter-form">
            <div class="form-group">
              <label for="range">Date Range</label>
              <div class="select-wrapper">
                <select id="range">
                  <option>Last 7 days</option>
                  <option>Last 30 days</option>
                  <option>Last 90 days</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="channel">Channel</label>
              <div class="select-wrapper">
                <select id="channel">
                  <option>All channels</option>
                  <option>Organic</option>
                  <option>Paid</option>
                </select>
              </div>
            </div>
          </form>
        </aside>

        <div class="content-wrapper">
          
          <section class="metrics-grid">
            <article class="glass-panel metric-card">
              <h3>Visitors</h3>
              <p class="gradient-text">42,100</p>
            </article>
            <article class="glass-panel metric-card">
              <h3>Conversion Rate</h3>
              <p class="gradient-text">3.8%</p>
            </article>
            <article class="glass-panel metric-card">
              <h3>Bounce Rate</h3>
              <p class="gradient-text">28%</p>
            </article>
          </section>

          <section class="glass-panel table-section">
            <h2>Top Pages</h2>
            <div class="table-responsive">
              <table class="custom-table">
                <thead>
                  <tr>
                    <th>Page</th>
                    <th>Views</th>
                    <th>Conversion</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><span class="page-badge">Homepage</span></td>
                    <td>18,400</td>
                    <td><span class="status-good">4.2%</span></td>
                  </tr>
                  <tr>
                    <td><span class="page-badge">Pricing</span></td>
                    <td>8,120</td>
                    <td><span class="status-excellent">6.1%</span></td>
                  </tr>
                  <tr>
                    <td><span class="page-badge">Blog</span></td>
                    <td>5,900</td>
                    <td><span class="status-warning">1.9%</span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

        </div>
      </main>
    </div>
  </body>
</html>
