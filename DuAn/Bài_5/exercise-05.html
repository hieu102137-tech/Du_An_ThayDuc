<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 05 - Profile Settings Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-05.css">
  </head>
  <body>
    <div class="page-wrapper">
      
      <header class="page-header">
        <h1>Profile Settings</h1>
        <p>Manage your account settings and preferences.</p>
      </header>

      <main class="settings-container">
        <form class="settings-form">
          
          <section class="form-section">
            <div class="section-header">
              <h2>Account</h2>
            </div>
            <div class="section-content">
              
              <div class="form-group">
                <label for="fullName">Full Name</label>
                <input id="fullName" type="text" placeholder="Enter your full name" />
              </div>

              <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="you@example.com" />
              </div>

              <div class="form-group">
                <label for="language">Language</label>
                <div class="select-wrapper">
                  <select id="language">
                    <option>English</option>
                    <option>Vietnamese</option>
                    <option>Japanese</option>
                  </select>
                </div>
              </div>

            </div>
          </section>

          <section class="form-section">
            <div class="section-header">
              <h2>Preferences</h2>
            </div>
            <div class="section-content">
              
              <div class="form-group toggle-group">
                <label class="toggle-switch">
                  <input type="checkbox" checked />
                  <span class="slider"></span>
                  <span class="toggle-text">Email notifications</span>
                </label>
              </div>

              <div class="form-group toggle-group">
                <label class="toggle-switch">
                  <input type="checkbox" />
                  <span class="slider"></span>
                  <span class="toggle-text">Marketing updates</span>
                </label>
              </div>

              <div class="form-group mt-3">
                <label for="theme">Theme</label>
                <div class="select-wrapper">
                  <select id="theme">
                    <option>Light</option>
                    <option>Dark</option>
                    <option>System</option>
                  </select>
                </div>
              </div>

            </div>
          </section>

          <section class="form-section">
            <div class="section-header">
              <h2>Security</h2>
            </div>
            <div class="section-content security-actions">
              <button type="button" class="btn-secondary">Change Password</button>
              <button type="button" class="btn-secondary">Enable 2FA</button>
            </div>
          </section>

          <section class="form-actions">
            <button type="button" class="btn-outline">Cancel</button>
            <button type="submit" class="btn-primary">Save Changes</button>
          </section>

        </form>
      </main>

    </div>
  </body>
</html>
